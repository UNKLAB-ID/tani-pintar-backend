volumes:
  tani_pintar_production_django_media: {}
  tani_pintar_production_postgres_data: {}
  tani_pintar_production_postgres_data_backups: {}
  tani_pintar_production_redis_data: {}

services:
  django: &django
    image: ghcr.io/unklab-id/tani-pintar-backend/django:latest
    volumes:
      - tani_pintar_production_django_media:/app/core/media
    depends_on:
      - postgres
      - redis
    env_file:
      - ./.envs/.production/.django
      - ./.envs/.production/.postgres
    command: /start

  postgres:
    image: ghcr.io/unklab-id/tani-pintar-backend/postgres:latest
    volumes:
      - tani_pintar_production_postgres_data:/var/lib/postgresql/data
      - tani_pintar_production_postgres_data_backups:/backups
    env_file:
      - ./.envs/.production/.postgres

  redis:
    image: docker.io/redis:6
    volumes:
      - tani_pintar_production_redis_data:/data

  celeryworker:
    <<: *django
    image: ghcr.io/unklab-id/tani-pintar-backend/django:latest
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: ghcr.io/unklab-id/tani-pintar-backend/django:latest
    command: /start-celerybeat

  flower:
    <<: *django
    image: ghcr.io/unklab-id/tani-pintar-backend/django:latest
    command: /start-flower

  nginx:
    image: ghcr.io/unklab-id/tani-pintar-backend/nginx:latest
    depends_on:
      - django
    volumes:
      - tani_pintar_production_django_media:/usr/share/nginx/media:ro
    ports:
      - "100.86.58.86:64000:80"

  awscli:
    image: ghcr.io/unklab-id/tani-pintar-backend/awscli:latest
    env_file:
      - ./.envs/.production/.django
    volumes:
      - tani_pintar_production_postgres_data_backups:/backups:z
